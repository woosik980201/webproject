<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>

    <script>
        let date = new Date();
        let hours = date.getHours();

        if (hours < 5) {
            alert("새벽입니다. 좀 더 주무세요.");
        } else if (hours < 7) {
            alert("일어나서 출근 준비를 하세요.");
        } else if (hours < 9) {
            alert("회사에 출근 중입니다.");
        } else if (hours < 12) {
            alert("열심히 회사 업무를 처리하세요.");
        } else if (hours < 13) {
            alert("점심시간입니다. 맛있게 드세요.");
        } else if (hours < 18) {
            alert("열심히 다시 회사 업무를 처리하세요.");
        } else {
            alert("퇴근 시간입니다. 집에 가서 쉬세요.");
        }
    </script>
</head>
<body>

</body>
</html>
