<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
const PI = Math.PI;

function circlecalc(r){
    //  원의 둘레
    let circul = 2 * PI * r;
    alert("반지름이 "+r+"cm인 원의 둘레: " + circul + "cm");
    //원의 넓이
    let area = PI*Math.pow(r,2);
    alert("반지름이 "+r+"cm인 원의 넓이: " + area + "cm"); 
}
    circlecalc(7);
    circlecalc(10);
    circlecalc(15);
    </script>

</head>
