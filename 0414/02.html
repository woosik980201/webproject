<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구조선택자</title>
    <!--구조 선택자-->
    <style>
        ul{
            overflow: hidden;
        }

        li{
            list-style: none;
            float: left;
            width: 100px;
            padding: 20px;
            color: aliceblue;
            font-weight: bold;
            text-align: center;
        }
        li:first-child{
            border-radius: 10px 0 0 10px;
        }
         li:last-child{
            border-radius: 0 10px 10px 0;
        }
         li:nth-child(2n){
            background-color: rgba(221, 14, 14, 0.4);
        }
         li:nth-child(2n+1){
            background-color: rgba(77, 153, 16, 0.4);
         }
    </style>
</head>
<body>
    <ul>
        <li>첫번째 항목</li>
        <li>두번째 항목</li>
        <li>세번째 항목</li>
        <li>네번째 항목</li>
        <li>다섯번째 항목</li>
        <li>여섯번째 항목</li>
        <li>일곱번째 항목</li>
    </ul>
</body>
</html>
