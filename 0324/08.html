<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 만들기</title>
</head>
<body>
<h3>순서가 없는 목록</h3>
<ul type="square">
    <!--disc(default)| circle | square -->
<li>금귤</li>
<li>딸기</li>
<li>천혜향</li>
</ul>

<h3>순서가 있는 목록</h3>
<ol type="i"> <!--1(default)| a | a | I | i square -->
<li>금귤</li>
<li>딸기</li>
<li>천혜향</li>
</ol>
</body>
</html>
